{{ define "main" }}
<article class="content-wrapper max-w-5xl mx-auto px-4 py-8">
  <header class="content-header mb-8">
    <h1 class="title text-4xl font-bold mb-4">{{ .Title }}</h1>
    {{ with .Description }}
      <p class="description text-xl text-gray-600">{{ . }}</p>
    {{ end }}
  </header>

  <div class="content prose max-w-none">
    {{ .Content }}
  </div>

  {{ with .Params.tags }}
  <div class="tags mt-8 pt-4 border-t">
    <h3 class="text-lg font-semibold mb-2">Tags:</h3>
    <div class="flex flex-wrap gap-2">
      {{ range . }}
      <a href="{{ "/tags/" | relLangURL }}{{ . | urlize }}" class="tag px-3 py-1 bg-gray-100 rounded-full text-sm hover:bg-gray-200 transition">
        #{{ . }}
      </a>
      {{ end }}
    </div>
  </div>
  {{ end }}
</article>
{{ end }}
