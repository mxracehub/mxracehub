[goldmark]
[goldmark.extensions]
definitionList = true
footnote = true
linkify = true
strikethrough = true
table = true
taskList = true
typographer = true

[goldmark.parser]
autoHeadingID = true
autoHeadingIDType = "github"

[goldmark.parser.attribute]
block = true
title = true

[goldmark.renderer]
unsafe = true
hardWraps = true

[goldmark.extensions.typographer]
apostrophe = true
disable = false
ellipsis = true
emDash = true
enDash = true
quotes = true

[highlight]
  noClasses = false

[tableOfContents]
  startLevel = 2
  endLevel = 4